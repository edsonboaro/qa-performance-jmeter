name: Performance Tests - BlazeDemo

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master", "develop" ]
  workflow_dispatch:

jobs:
  performance-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      # Melhoria: Cache para não baixar o JMeter toda vez
      - name: Cache JMeter
        id: cache-jmeter
        uses: actions/cache@v4
        with:
          path: apache-jmeter-5.6.3
          key: jmeter-5.6.3

      - name: Baixar JMeter
        if: steps.cache-jmeter.outputs.cache-hit != 'true'
        run: |
          wget https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-5.6.3.zip
          unzip apache-jmeter-5.6.3.zip

      - name: Criar diretório de artifacts
        run: mkdir -p artifacts

      - name: Executar teste de performance
        # Usamos "continue-on-error" porque sabemos que o SLA de 2s pode falhar
        # mas queremos gerar o dashboard mesmo assim para análise.
        continue-on-error: true
        run: |
          apache-jmeter-5.6.3/bin/jmeter -n \
            -t blazedemo-performance.jmx \
            -l artifacts/resultado.jtl \
            -e -o artifacts/dashboard

      - name: Publicar dashboard HTML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-performance
          path: artifacts/dashboard
          if-no-files-found: error